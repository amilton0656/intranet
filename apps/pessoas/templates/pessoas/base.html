{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pessoas — Intranet{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{% static 'intranet/css/navbar.css' %}">
  <style>
    body { background: #f4f3f6; }
    .page-header { padding: 1.5rem 2rem 0.5rem; }
    .main-content { padding: 1rem 2rem 2rem; }
    .data-table { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.07); overflow: hidden; }
    .data-table table { font-size: 0.85rem; margin-bottom: 0; }
    .data-table thead th { font-size: 0.72rem; text-transform: uppercase; color: #888; background: #f8f7fa; border-bottom: 2px solid #e9e9ef; padding: 10px 14px; }
    .data-table tbody td { padding: 8px 14px; vertical-align: middle; }
    .form-card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    #pessoas-navbar { background: #A7A3AB !important; padding: 0.5rem 1.5rem; }
    #pessoas-navbar .navbar-brand { color: #282828 !important; font-size: 0.95rem; font-weight: 600; }
    #pessoas-navbar .nav-link { color: rgba(40,40,40,.85) !important; font-size: 0.85rem; padding: 0.4rem 0.9rem !important; border-radius: 6px; transition: background .2s; }
    #pessoas-navbar .nav-link:hover, #pessoas-navbar .nav-link.{% block nav_pessoas %}{% endblock %} { background: rgba(0,0,0,.1); color: #282828 !important; }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>

{% include 'intranet/intranet_navbar.html' %}

<nav id="pessoas-navbar" class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <span class="navbar-brand"><i class="bi bi-people me-2"></i>Pessoas</span>
    <div class="navbar-nav ms-3">
      <a class="nav-link {% block nav_all %}{% endblock %}" href="{% url 'pessoas:pessoa_list' %}">Todos</a>
      <a class="nav-link" href="{% url 'pessoas:pessoa_list' %}?papel=cliente">Clientes</a>
      <a class="nav-link" href="{% url 'pessoas:pessoa_list' %}?papel=corretor">Corretores</a>
      <a class="nav-link" href="{% url 'pessoas:pessoa_list' %}?papel=imobiliaria">Imobiliárias</a>
      <a class="nav-link" href="{% url 'pessoas:pessoa_list' %}?papel=fornecedor">Fornecedores</a>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
