{% extends "pessoas/base.html" %}
{% block title %}Excluir Pessoa — Pessoas{% endblock %}

{% block content %}
<div class="page-header">
  <h1><i class="bi bi-person me-2"></i>Excluir Pessoa</h1>
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="{% url 'pessoas:pessoa_list' %}">Pessoas</a></li>
      <li class="breadcrumb-item active">Excluir</li>
    </ol>
  </nav>
</div>

<div class="main-content">
  <div class="form-card p-4" style="max-width:480px;">
    <p class="mb-1">Confirma a exclusão de:</p>
    <p class="fw-semibold fs-5 mb-4">{{ obj.nome }}</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger btn-sm px-4">
          <i class="bi bi-trash me-1"></i>Excluir
        </button>
        <a href="{% url 'pessoas:pessoa_list' %}" class="btn btn-outline-secondary btn-sm px-4">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
