{% extends 'contratos/base.html' %}
{% block title %}Excluir Minuta{% endblock %}

{% block content %}
<div class="page-header">
  <h1><i class="bi bi-trash me-2"></i>Excluir Minuta</h1>
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="{% url 'contratos:minuta_list' %}">Minutas</a></li>
      <li class="breadcrumb-item active">Excluir</li>
    </ol>
  </nav>
</div>

<div class="main-content">
  <div class="form-card p-4" style="max-width:480px;">
    <p class="mb-1">Deseja excluir a minuta <strong>{{ obj.nome }}</strong>?</p>
    <p class="text-muted small mb-4">O arquivo Word associado também será removido.</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger btn-sm px-4">
          <i class="bi bi-trash me-1"></i>Excluir
        </button>
        <a href="{% url 'contratos:minuta_list' %}" class="btn btn-outline-secondary btn-sm px-4">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
