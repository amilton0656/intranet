{% with current=request.resolver_match.url_name %}
<nav id="bliss-navbar" class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'bliss_unidades' %}">
      <i class="bi bi-building me-2"></i>Bliss Living
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#bliss-nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="bliss-nav">
      <ul class="navbar-nav ms-3 gap-1">
        {% for item in menu_itens.bliss.secundaria %}
        <li class="nav-item">
          <a class="nav-link {% if current == item.url_name_base %}active{% endif %}"
             href="{{ item.url }}">
            {% if item.icon %}<i class="bi {{ item.icon }} me-1"></i>{% endif %}
            {{ item.label }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</nav>
{% endwith %}

<style>
  @media (max-width: 767.98px) { #bliss-navbar { display: none !important; } }
  #bliss-navbar { background: #A7A3AB !important; padding: 0.6rem 1.5rem; }
  #bliss-navbar .navbar-brand { font-weight: 700; font-size: 1.1rem; color: #282828 !important; letter-spacing: 0.03em; }
  #bliss-navbar .nav-link { color: rgba(40,40,40,.85) !important; font-size: 0.85rem; padding: 0.4rem 0.9rem !important; border-radius: 6px; transition: background .2s; }
  #bliss-navbar .nav-link:hover, #bliss-navbar .nav-link.active { background: rgba(0,0,0,.1); color: #282828 !important; }
</style>
