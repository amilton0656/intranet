{% extends "viabilidade/base.html" %}
{% block title %}Curva{% endblock %}
{% block content %}
<div class="card mx-auto" style="max-width:500px">
  <div class="card-header bg-white fw-semibold">Curva de Construção</div>
  <div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label class="form-label">Descrição</label>{{ form.descricao }}</div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="{% url 'viabilidade:curva_list' %}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
