<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Viabilidade - Estudo{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --azul-escuro: #1a3a6b;
      --azul-header: #2152a3;
      --azul-barra: #003399;
      --cinza-form: #e8e8e8;
      --verde-resultado: #00cc00;
      --amarelo-resultado: #ffff00;
    }
    html, body { height: 100%; margin: 0; overflow: hidden; font-size: 12px; }
    body { background: var(--cinza-form); font-family: 'Segoe UI', Tahoma, sans-serif; }

    /* Header principal */
    .painel-topo {
      background: var(--azul-header);
      color: white;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      flex-shrink: 0;
    }
    .painel-topo label { color: #cce; margin: 0; white-space: nowrap; }
    .painel-topo input, .painel-topo select {
      background: white; color: #000; border: 1px solid #aaa;
      border-radius: 2px; padding: 1px 4px; font-size: 12px; height: 22px;
    }
    .painel-topo .btn-nav {
      background: #7090c0; border: 1px solid #aaa; color: white;
      padding: 1px 6px; font-size: 11px; cursor: pointer; border-radius: 2px;
    }

    /* Tabs */
    .painel-tabs { background: var(--cinza-form); flex-shrink: 0; }
    .painel-tabs .nav-tabs { border-bottom: 2px solid var(--azul-header); padding: 3px 4px 0; gap: 2px; }
    .painel-tabs .nav-link {
      background: #c0c8d8; color: #000; border: 1px solid #aaa;
      border-bottom: none; border-radius: 3px 3px 0 0;
      padding: 3px 12px; font-size: 12px;
    }
    .painel-tabs .nav-link.active {
      background: white; border-bottom: 2px solid white; margin-bottom: -2px; font-weight: 600;
    }
    .painel-tabs .nav-link:hover:not(.active) { background: #d8dff0; }

    /* Área de conteúdo */
    .painel-body { display: flex; flex: 1; min-height: 0; }
    .painel-conteudo {
      flex: 1; min-width: 0; overflow-y: auto;
      padding: 6px; background: var(--cinza-form);
    }
    .tab-content { height: 100%; }
    .tab-pane { height: 100%; }

    /* Grupos de campos */
    .grupo {
      background: white; border: 1px solid #b0b8c8;
      border-radius: 3px; padding: 6px 8px; margin-bottom: 6px;
    }
    .grupo legend, .grupo-titulo {
      font-size: 11px; font-weight: 600; color: #334;
      padding: 0 4px; margin-bottom: 4px;
    }
    .form-label-sm { font-size: 11px; margin-bottom: 1px; color: #334; }
    .form-control-sm, .form-select-sm { font-size: 12px; height: 22px; padding: 1px 4px; }
    textarea.form-control-sm { height: auto; }

    .res-box {
      background: var(--azul-escuro); border: 1px solid #335;
      border-radius: 3px; overflow: hidden;
    }
    .res-box-titulo {
      background: var(--azul-barra); color: white;
      text-align: center; font-size: 11px; font-weight: 700;
      padding: 3px; letter-spacing: .05em;
    }
    .res-item {
      display: flex; flex-direction: row;
      align-items: center; justify-content: space-between;
      padding: 4px 6px; border-bottom: 1px solid #335; gap: 6px;
    }
    .res-item:last-child { border-bottom: none; }
    .res-label { color: #aad; font-size: 11px; white-space: nowrap; }
    .res-valor { color: var(--verde-resultado); font-size: 12px; font-weight: 700; font-family: monospace; text-align: right; }
    .res-rodape {
      background: #001166; color: #aad; font-size: 10px;
      padding: 3px 6px; display: flex; justify-content: space-between;
    }
    .res-margem { color: var(--amarelo-resultado); font-weight: 700; }

    /* Barra de totais (estilo Delphi, azul) */
    .barra-totais {
      background: var(--azul-barra); color: white; font-size: 11px;
      flex-shrink: 0; padding: 2px 4px;
    }
    .barra-totais table { width: 100%; }
    .barra-totais td { padding: 1px 4px; white-space: nowrap; }
    .barra-totais .col-header { color: #cce; font-size: 10px; font-weight: 600; }
    .barra-totais .val { font-family: monospace; text-align: right; }
    .barra-totais .label { color: #aad; }

    /* Grids inline */
    .grid-inline { font-size: 11px; border-collapse: collapse; width: 100%; }
    .grid-inline th {
      background: #dde3f0; color: #334; font-size: 10px; font-weight: 700;
      padding: 2px 4px; border: 1px solid #b0b8c8; white-space: nowrap;
    }
    .grid-inline td {
      padding: 1px 4px; border: 1px solid #d0d8e0; vertical-align: middle;
    }
    .grid-inline tr:nth-child(even) td { background: #f5f7fa; }
    .grid-inline tr:hover td { background: #e8edf8; }
    .grid-inline input, .grid-inline select {
      font-size: 11px; padding: 1px 3px; height: 20px; width: 100%;
      border: 1px solid #aaa; border-radius: 2px;
    }
    .grid-inline .btn-acao {
      font-size: 10px; padding: 1px 5px; border: 1px solid #aaa;
      border-radius: 2px; cursor: pointer; white-space: nowrap;
    }
    .btn-edit  { background: #e0e8ff; color: #114; }
    .btn-del   { background: #ffe0e0; color: #911; }
    .btn-save  { background: #e0ffe0; color: #141; }
    .btn-cancel{ background: #f0f0f0; color: #333; }
    .btn-add   { background: #c0d8ff; color: #114; font-size: 11px; padding: 2px 8px; border: 1px solid #7090c0; border-radius: 3px; cursor: pointer; }

    /* Checkboxes estilo Delphi */
    .ck-label { font-size: 11px; display: flex; align-items: center; gap: 4px; }
    input[type=checkbox] { width: 13px; height: 13px; }
    input[type=radio]    { width: 13px; height: 13px; }

    /* Campos numéricos alinhados à direita */
    .num-input { text-align: right; }

    /* Modal HTMX */
    .htmx-modal .modal-header { background: var(--azul-header); color: white; padding: 6px 12px; }
    .htmx-modal .modal-body   { padding: 10px; }
    .htmx-modal .modal-footer { padding: 6px 12px; }

    /* Seções de custo (Outros Custos) */
    .custo-linha {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 0; border-bottom: 1px solid #eee;
    }
    .custo-linha:last-child { border-bottom: none; }
    .custo-desc { flex: 1; font-size: 11px; color: #334; }
    .custo-valor { width: 110px; text-align: right; font-family: monospace; font-size: 11px; }
    .custo-perc  { width: 70px; }
    .custo-base  { font-size: 10px; color: #668; white-space: nowrap; }

    /* Financeiro */
    .tx-linha {
      display: flex; align-items: center; gap: 6px; padding: 3px 0;
      border-bottom: 1px solid #eee;
    }
    .tx-desc { width: 160px; font-size: 11px; }
    .tx-val  { width: 80px; }
    .tx-conv { font-size: 10px; color: #668; white-space: nowrap; }

    /* Responsivo overflow */
    .overflow-auto-x { overflow-x: auto; }
  </style>
</head>
<body class="d-flex flex-column" style="height:100vh">

{% block body %}{% endblock %}

<!-- Modal genérico para HTMX -->
<div class="modal fade htmx-modal" id="htmxModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" id="htmxModalContent">
      <div class="modal-header">
        <h6 class="modal-title mb-0" id="htmxModalLabel">Formulário</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="htmxModalBody">
        <!-- HTMX carrega o formulário aqui -->
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
<meta name="csrf-token" content="{{ csrf_token }}">
<script>
  // CSRF token em todos os requests HTMX (necessário para botões fora do <form> principal)
  document.addEventListener('htmx:configRequest', function(e) {
    e.detail.headers['X-CSRFToken'] = document.querySelector('meta[name="csrf-token"]').content;
  });

  // Fechar modal quando HTMX disparar evento de sucesso
  ['configSaved','velocSaved','construSaved','distribSaved','paramSaved','agrupSaved'].forEach(evt => {
    document.addEventListener(evt, () => {
      const m = bootstrap.Modal.getInstance(document.getElementById('htmxModal'));
      if (m) m.hide();
      atualizarResultados();
    });
  });

  // Abrir modal ao carregar formulário HTMX
  function abrirModal(titulo) {
    document.getElementById('htmxModalLabel').textContent = titulo || 'Formulário';
    const m = new bootstrap.Modal(document.getElementById('htmxModal'));
    m.show();
  }

  // Cálculo em tempo real
  let calcTimer = null;
  function atualizarResultados() {
    clearTimeout(calcTimer);
    calcTimer = setTimeout(() => {
      const pk = document.body.dataset.estudoPk;
      if (!pk) return;
      fetch(`/estudos/${pk}/calcular/`)
        .then(r => r.json())
        .then(d => {
          const f = v => v != null ? parseFloat(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}) : '0,00';
          const f4 = v => v != null ? parseFloat(v).toLocaleString('pt-BR', {minimumFractionDigits:4, maximumFractionDigits:4}) : '0,0000';
          const el = id => document.getElementById(id);
          if (el('res-receita-liq'))   el('res-receita-liq').textContent   = f(d.rec_liq);
          if (el('res-custo-total'))   el('res-custo-total').textContent   = f(d.custo_total);
          if (el('res-lucro-liq'))     el('res-lucro-liq').textContent     = f(d.resultado_liq);
          if (el('res-m2-total'))      el('res-m2-total').textContent      = f(d.area_real_total);
          if (el('res-margem'))        el('res-margem').textContent        = f(d.margem_liq) + ' %';
          if (el('res-permutas'))      el('res-permutas').textContent      = '0,00 %';
          // Barra de métricas
          if (el('preco-medio-m2'))    el('preco-medio-m2').textContent    = f4(d.preco_medio_m2);
          if (el('preco-medio-unid'))  el('preco-medio-unid').textContent  = f4(d.preco_medio_unid);
          if (el('area-real-media'))   el('area-real-media').textContent   = f4(d.area_real_media_unid);
          if (el('area-priv-media'))   el('area-priv-media').textContent   = f4(d.area_priv_media_unid);
          if (el('eficiencia-proj'))   el('eficiencia-proj').textContent   = f(d.eficiencia_decimal);
          // Totais na barra inferior
          const totaisMap = {
            'und-total': d.und_total, 'und-permu': d.und_permu,
            'und-imob': d.und_imob, 'und-avenda': d.und_avenda,
            'und-gar': d.gar_total,
            'area-real-total': d.area_real_total, 'area-priv-total': d.area_priv_total,
            'und-area-real': d.area_real_total, 'und-area-priv': d.area_priv_total,
            'rec-total-val': d.rec_total, 'rec-liq-val': d.rec_liq,
          };
          Object.entries(totaisMap).forEach(([id, val]) => {
            if (el(id)) el(id).textContent = val != null ? f(val) : '—';
          });
        })
        .catch(() => {});
    }, 400);
  }

  // Chamar ao carregar página
  document.addEventListener('DOMContentLoaded', atualizarResultados);

  // Validação de percentuais: inputs com classe .perc-input devem ser >= 0
  document.getElementById('form-estudo')?.addEventListener('submit', function(e) {
    const percInputs = this.querySelectorAll('.custo-perc');
    for (const inp of percInputs) {
      if (!inp.name) continue;
      const raw = inp.value.replace(/\./g, '').replace(',', '.');
      const val = parseFloat(raw);
      if (!isNaN(val) && val < 0) {
        e.preventDefault();
        inp.focus();
        inp.style.borderColor = '#c00';
        alert(`Percentual inválido em "${inp.name}": valores negativos não são permitidos.`);
        return;
      }
    }
  });

  // Manter aba ativa no POST
  document.addEventListener('DOMContentLoaded', () => {
    const abaAtiva = document.getElementById('aba-ativa-input');
    const tabs = document.querySelectorAll('.painel-tabs .nav-link');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        if (abaAtiva) abaAtiva.value = tab.dataset.aba;
      });
    });
    // Restaurar aba ativa após POST
    const abaRestaurar = document.body.dataset.abaAtiva;
    if (abaRestaurar) {
      const t = document.querySelector(`.nav-link[data-aba="${abaRestaurar}"]`);
      if (t) {
        const tabEl = new bootstrap.Tab(t);
        tabEl.show();
      }
    }
  });
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
