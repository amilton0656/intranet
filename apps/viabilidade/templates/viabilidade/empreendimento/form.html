{% extends "viabilidade/base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="card mx-auto" style="max-width:600px">
  <div class="card-header bg-white fw-semibold">{{ titulo }}</div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
        </div>
      {% endfor %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="{% url 'viabilidade:empreendimento_list' %}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
