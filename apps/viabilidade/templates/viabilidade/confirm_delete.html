{% extends "viabilidade/base.html" %}
{% block title %}Confirmar Exclusão{% endblock %}
{% block content %}
<div class="card mx-auto" style="max-width:500px">
  <div class="card-body text-center p-4">
    <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
    <h5 class="mt-3">Confirmar Exclusão</h5>
    <p class="text-muted">Tem certeza que deseja excluir <strong>{{ object }}</strong>? Esta ação não pode ser desfeita.</p>
    <form method="post">
      {% csrf_token %}
      <a href="javascript:history.back()" class="btn btn-secondary me-2">Cancelar</a>
      <button type="submit" class="btn btn-danger">Excluir</button>
    </form>
  </div>
</div>
{% endblock %}
