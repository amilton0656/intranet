<form hx-post="{% if obj %}{% url 'viabilidade:htmx_agrup_save_edit' estudo.pk obj.pk %}{% else %}{% url 'viabilidade:htmx_agrup_save_new' estudo.pk %}{% endif %}"
      hx-target="#agrup-section" hx-swap="outerHTML">
  {% csrf_token %}
  <div class="row g-2">
    <div class="col-9">
      <label class="form-label-sm">Descrição</label>
      <input type="text" name="descricao" value="{{ obj.descricao|default:'' }}" class="form-control form-control-sm">
    </div>
    <div class="col-3">
      <label class="form-label-sm">Ordem</label>
      <input type="number" name="ordem" value="{{ obj.ordem|default:0 }}" class="form-control form-control-sm">
    </div>
  </div>
  <div class="d-flex gap-2 mt-3">
    <button type="submit" class="btn btn-sm btn-primary">Salvar</button>
    <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
  </div>
</form>
