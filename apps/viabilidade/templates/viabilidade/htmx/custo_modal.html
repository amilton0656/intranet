<div id="custo-modal-content">

  <table class="grid-inline mb-3" style="width:100%">
    <thead>
      <tr>
        <th>Descrição</th>
        <th class="text-center" style="width:60px">Distribuição</th>
        <th style="width:50px"></th>
      </tr>
    </thead>
    <tbody>
      {% for c in custos %}
      <tr>
        <td>{{ c.descricao }}</td>
        <td class="text-center">{% if c.distrib %}&#10003;{% endif %}</td>
        <td style="white-space:nowrap">
          <button type="button" class="btn-acao btn-del"
            hx-post="{% url 'viabilidade:htmx_custo_delete' c.pk %}"
            hx-target="#custo-modal-content"
            hx-swap="outerHTML"
            hx-confirm="Excluir '{{ c.descricao }}'?">X</button>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="3" style="text-align:center;color:#999;padding:6px">Nenhum custo cadastrado.</td></tr>
      {% endfor %}
    </tbody>
  </table>

  <hr style="margin:8px 0">

  <form hx-post="{% url 'viabilidade:htmx_custo_save' %}"
        hx-target="#custo-modal-content"
        hx-swap="outerHTML">
    {% csrf_token %}
    <div class="d-flex gap-2 align-items-center">
      <input type="text" name="descricao" class="form-control form-control-sm"
             placeholder="Descrição do custo..." style="flex:1" autofocus>
      <label class="ck-label mb-0" style="white-space:nowrap">
        <input type="checkbox" name="distrib"> Distribuição
      </label>
      <button type="submit" class="btn btn-sm btn-primary">+ Add</button>
    </div>
  </form>

</div>
