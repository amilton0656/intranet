<div id="curva-modal-content">

  <table class="grid-inline mb-3" style="width:100%">
    <thead>
      <tr><th>Descrição</th><th style="width:100px"></th></tr>
    </thead>
    <tbody>
      {% for c in curvas %}
      <tr>
        <td>{{ c.descricao }}</td>
        <td style="white-space:nowrap">
          <button type="button" class="btn-acao" style="background:#d0e8ff"
            hx-get="{% url 'viabilidade:htmx_curva_meses' c.pk %}"
            hx-target="#curva-modal-content"
            hx-swap="outerHTML">Meses</button>
          <button type="button" class="btn-acao btn-del"
            hx-post="{% url 'viabilidade:htmx_curva_delete' c.pk %}"
            hx-target="#curva-modal-content"
            hx-swap="outerHTML"
            hx-confirm="Excluir '{{ c.descricao }}'?">X</button>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="2" style="text-align:center;color:#999;padding:6px">Nenhuma curva cadastrada.</td></tr>
      {% endfor %}
    </tbody>
  </table>

  <hr style="margin:8px 0">

  <form hx-post="{% url 'viabilidade:htmx_curva_save_new' %}"
        hx-target="#curva-modal-content"
        hx-swap="outerHTML">
    {% csrf_token %}
    <div class="d-flex gap-2 align-items-center">
      <input type="text" name="descricao" class="form-control form-control-sm"
             placeholder="Nome da curva..." style="flex:1" autofocus>
      <button type="submit" class="btn btn-sm btn-primary">+ Adicionar</button>
    </div>
  </form>

</div>
