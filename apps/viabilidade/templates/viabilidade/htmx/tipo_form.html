<form hx-post="{% if obj %}{% url 'viabilidade:htmx_tipo_save_edit' obj.pk %}{% else %}{% url 'viabilidade:htmx_tipo_save_new' %}{% endif %}"
      hx-target="#tipo-modal-content"
      hx-swap="outerHTML">
  {% csrf_token %}
  <div class="d-flex gap-2 align-items-center">
    <input type="text" name="descricao" value="{{ obj.descricao|default:'' }}"
           class="form-control form-control-sm" placeholder="Descrição do tipo..."
           style="flex:1" autofocus>
    <button type="submit" class="btn btn-sm btn-primary">
      {% if obj %}Salvar{% else %}+ Adicionar{% endif %}
    </button>
    {% if obj %}
    <button type="button" class="btn btn-sm btn-secondary"
      hx-get="{% url 'viabilidade:htmx_tipo_modal' %}"
      hx-target="#tipo-modal-content"
      hx-swap="outerHTML">Cancelar</button>
    {% endif %}
  </div>
</form>
