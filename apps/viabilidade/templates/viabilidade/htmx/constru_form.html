<form hx-post="{% if obj %}{% url 'viabilidade:htmx_constru_save_edit' estudo.pk obj.pk %}{% else %}{% url 'viabilidade:htmx_constru_save_new' estudo.pk %}{% endif %}"
      hx-target="#constru-section" hx-swap="outerHTML">
  {% csrf_token %}
  <div class="row g-2">
    <div class="col-12">
      <label class="form-label-sm">Descrição</label>
      <input type="text" name="descricao" value="{{ obj.descricao|default:'' }}" class="form-control form-control-sm">
    </div>
    <div class="col-4">
      <label class="form-label-sm">% do Custo</label>
      <input type="text" name="constru_perc" value="{{ obj.constru_perc|default:0 }}" class="form-control form-control-sm text-end">
    </div>
    <div class="col-4">
      <label class="form-label-sm">Mês de Início</label>
      <input type="number" name="constru_inicio" value="{{ obj.constru_inicio|default:0 }}" class="form-control form-control-sm">
    </div>
    <div class="col-4">
      <label class="form-label-sm">Custo/m²</label>
      <input type="text" name="custo_m2" value="{{ obj.custo_m2|default:0 }}" class="form-control form-control-sm text-end">
    </div>
    <div class="col-12">
      <label class="form-label-sm">Curva de Construção</label>
      <select name="curva" class="form-select form-select-sm">
        <option value="">— Nenhuma —</option>
        {% for c in curvas %}<option value="{{ c.pk }}" {% if obj and obj.curva_id == c.pk %}selected{% endif %}>{{ c.descricao }}</option>{% endfor %}
      </select>
    </div>
  </div>
  <div class="d-flex gap-2 mt-3">
    <button type="submit" class="btn btn-sm btn-primary">Salvar</button>
    <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
  </div>
</form>
