{% extends "viabilidade/base.html" %}
{% block title %}Tipos{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">Tipos de Unidade</h4>
  <a href="{% url 'viabilidade:tipo_create' %}" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> Novo</a>
</div>
<div class="card">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead><tr><th>Descrição</th><th></th></tr></thead>
      <tbody>
        {% for t in tipos %}
        <tr>
          <td>{{ t.descricao }}</td>
          <td>
            <a href="{% url 'viabilidade:tipo_update' t.pk %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
            <a href="{% url 'viabilidade:tipo_delete' t.pk %}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
          </td>
        </tr>
        {% empty %}<tr><td colspan="2" class="text-center text-muted py-4">Nenhum tipo.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
