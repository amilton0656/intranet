{% extends "incorporadora/base.html" %}
{% block title %}Excluir Série — Incorporadora{% endblock %}
{% block nav_empreendimentos %}active{% endblock %}

{% block content %}
<div class="page-header">
  <h1><i class="bi bi-list-ol me-2"></i>Excluir Série de Pagamento</h1>
</div>
<div class="main-content">
  <div class="form-card p-4" style="max-width:480px;">
    <p class="mb-1">Confirma a exclusão da série:</p>
    <p class="fw-semibold fs-5 mb-4">{{ obj }}</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger btn-sm px-4"><i class="bi bi-trash me-1"></i>Excluir</button>
        <a href="{% url 'incorporadora:tabela_detail' pk=obj.tabela.pk %}" class="btn btn-outline-secondary btn-sm px-4">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
