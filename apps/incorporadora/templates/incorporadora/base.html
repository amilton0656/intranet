{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Incorporadora{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{% static 'intranet/css/navbar.css' %}">
  <style>
    :root {
      --navy:   #1a1a2e;
      --border: #e2e6ea;
    }

    body {
      background: #f5f6fa;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.9rem;
    }

    #inc-navbar {
      background: #A7A3AB !important;
      padding: 0.6rem 1.5rem;
    }
    #inc-navbar .navbar-brand {
      font-weight: 700;
      font-size: 1.1rem;
      color: #282828 !important;
      letter-spacing: 0.03em;
    }
    #inc-navbar .nav-link {
      color: rgba(40,40,40,.85) !important;
      font-size: 0.85rem;
      padding: 0.4rem 0.9rem !important;
      border-radius: 6px;
      transition: background .2s;
    }
    #inc-navbar .nav-link:hover,
    #inc-navbar .nav-link.active {
      background: rgba(0,0,0,.1);
      color: #282828 !important;
    }

    .page-header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem 0.75rem;
    }
    .page-header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
      color: var(--navy);
    }
    .breadcrumb { margin: 0; font-size: 0.8rem; }
    .breadcrumb-item + .breadcrumb-item::before { color: #adb5bd; }

    .main-content { padding: 1.5rem; }

    .data-table {
      background: #fff;
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .data-table table { margin: 0; font-size: 0.85rem; }
    .data-table thead th {
      background: #fff;
      border-bottom: 2px solid var(--border);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6c757d;
      padding: 0.65rem 1rem;
      white-space: nowrap;
    }
    .data-table tbody td {
      padding: 0.6rem 1rem;
      border-color: #f0f2f5;
      vertical-align: middle;
    }
    .data-table tbody tr:hover { background: #f8f9fa; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

{% include 'intranet/intranet_navbar.html' %}

<nav id="inc-navbar" class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'incorporadora:empresa_list' %}">
      <i class="bi bi-buildings me-2"></i>Incorporadora
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#inc-nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="inc-nav">
      <ul class="navbar-nav ms-3 gap-1">
        <li class="nav-item">
          <a class="nav-link {% block nav_empresas %}{% endblock %}" href="{% url 'incorporadora:empresa_list' %}">
            <i class="bi bi-building me-1"></i>Empresas
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% block nav_empreendimentos %}{% endblock %}" href="{% url 'incorporadora:empreendimento_list' %}">
            <i class="bi bi-buildings me-1"></i>Empreendimentos
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
