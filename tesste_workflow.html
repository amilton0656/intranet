<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste Workflow – AAA BBB CCC DDD</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.css">
<style>
  body { margin: 0; font-family: sans-serif; }

  #toolbar {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 1rem; background: #1a1a2e; color: #fff;
  }
  #toolbar h6 { margin: 0; font-size: 0.85rem; }

  #drawflow {
    width: 100%; height: calc(100vh - 44px);
    background: #f5f6fa;
    background-image: radial-gradient(circle, #cdd2da 1px, transparent 1px);
    background-size: 22px 22px;
    position: relative; overflow: hidden; user-select: none;
  }

  .drawflow .drawflow-node {
    background: #fff; border: 1.5px solid #dee2e8; border-radius: 9px;
    padding: 0; min-width: 130px;
    box-shadow: 0 2px 8px rgba(0,0,0,.10); cursor: grab;
    z-index: 2;
  }
  .drawflow .drawflow-node:active { cursor: grabbing; }
  .drawflow .drawflow-node.selected {
    box-shadow: 0 0 0 2.5px #0d6efd, 0 2px 10px rgba(13,110,253,.2);
    border-color: #0d6efd;
  }
  .wf-node-header {
    padding: 8px 14px; border-radius: 7px 7px 0 0;
    color: #fff; font-size: 0.8rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em;
    text-align: center;
  }
  .wf-node-body { padding: 6px 12px 8px; font-size: 0.72rem; color: #6c757d; text-align: center; }

  .drawflow .input, .drawflow .output {
    width: 16px; height: 16px; background: #fff;
    border: 2.5px solid #9ca3af; border-radius: 50%;
    top: calc(50% - 8px); transition: .15s;
    position: absolute; z-index: 10;
    cursor: crosshair; pointer-events: all;
  }
  .drawflow .input  { left: -8px; }
  .drawflow .output { right: -8px; }
  .drawflow .input:hover, .drawflow .output:hover { background: #0d6efd; border-color: #0d6efd; }
  .drawflow .connection .main-path { stroke: #9ca3af; stroke-width: 2.5; fill: none; }
  .drawflow .connection .main-path:hover,
  .drawflow .connection.selected .main-path { stroke: #0d6efd; stroke-width: 3; }

  /* ── debug panel ── */
  #dbg {
    position: fixed; bottom: 10px; right: 10px;
    width: 280px; background: rgba(0,0,0,.82); color: #0f0;
    font: 11px/1.6 monospace; padding: 10px 12px; border-radius: 7px;
    z-index: 9999; pointer-events: none;
  }
  #dbg .lbl { color: #aaa; }
  #dbg .ok  { color: #4eff91; font-weight: bold; }
  #dbg .err { color: #ff6b6b; font-weight: bold; }
</style>
</head>
<body>

<div id="toolbar">
  <h6><i class="bi bi-diagram-3 me-2"></i>Teste Workflow</h6>
  <span class="text-secondary small ms-2">AAA → BBB → CCC → DDD</span>
  <button class="btn btn-sm btn-outline-light ms-auto" onclick="exportar()">
    <i class="bi bi-code-slash me-1"></i>Exportar JSON
  </button>
  <button class="btn btn-sm btn-outline-warning" onclick="limpar()">
    <i class="bi bi-trash me-1"></i>Limpar conexões
  </button>
</div>

<div id="drawflow"></div>

<!-- debug panel -->
<div id="dbg">
  <div><span class="lbl">connectionStart:</span> <span id="d-start">—</span></div>
  <div><span class="lbl">connectionCreated:</span> <span id="d-created">—</span></div>
  <div><span class="lbl">connectionCancel:</span> <span id="d-cancel">—</span></div>
  <div><span class="lbl">mouseup e.target:</span> <span id="d-target">—</span></div>
  <div><span class="lbl">dest node:</span> <span id="d-dest">—</span></div>
  <div><span class="lbl">addConnection:</span> <span id="d-add">—</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.js"></script>
<script>

// ── init ──────────────────────────────────────────────────────────────────────
const editor = new Drawflow(document.getElementById('drawflow'));
editor.reroute = true;
editor.reroute_fix_curvature = true;
editor.force_first_input = true;
editor.start();

// ── add nodes ─────────────────────────────────────────────────────────────────
const NODES = [
  { name: 'aaa', label: 'AAA', cor: '#0d6efd', x: 80,  y: 160 },
  { name: 'bbb', label: 'BBB', cor: '#198754', x: 300, y: 100 },
  { name: 'ccc', label: 'CCC', cor: '#dc3545', x: 300, y: 240 },
  { name: 'ddd', label: 'DDD', cor: '#6f42c1', x: 520, y: 160 },
];
NODES.forEach(function (n) {
  const html = `<div class="wf-node-header" style="background:${n.cor}">${n.label}</div>
                <div class="wf-node-body">etapa</div>`;
  editor.addNode(n.name, 1, 1, n.x, n.y, n.name, {}, html);
});

// ── debug helpers ─────────────────────────────────────────────────────────────
function dbg(id, txt, cls) {
  var el = document.getElementById(id);
  el.textContent = txt;
  el.className = cls || '';
}
function ts() { return new Date().toLocaleTimeString(); }

editor.on('connectionStart', function (info) {
  dbg('d-start', ts() + '  src=' + info.output_id + ' cls=' + info.output_class, '');
  dbg('d-created', '—', '');
  dbg('d-cancel',  '—', '');
  dbg('d-target',  '—', '');
  dbg('d-dest',    '—', '');
  dbg('d-add',     '—', '');
});

editor.on('connectionCreated', function (info) {
  dbg('d-created', ts() + '  ' + info.output_id + '→' + info.input_id, 'ok');
});

editor.on('connectionCancel', function () {
  dbg('d-cancel', ts() + '  CANCELADO', 'err');
});

// ── connection drag fix ───────────────────────────────────────────────────────
document.getElementById('drawflow').addEventListener('mouseup', function (e) {
  if (!editor.connection) return;

  var tempSvg = editor.connection_ele;

  // Hide temp SVG → elementFromPoint sees through it
  if (tempSvg) tempSvg.style.display = 'none';
  var el = document.elementFromPoint(e.clientX, e.clientY);
  if (tempSvg) tempSvg.style.display = '';

  // Log raw target for debug
  dbg('d-target', el ? (el.className + ' | ' + el.id) : 'null', '');

  // Walk up to drawflow-node
  var dest = el;
  while (dest && dest !== this) {
    if (dest.classList && dest.classList.contains('drawflow-node')) break;
    dest = dest.parentElement;
  }

  dbg('d-dest', dest && dest.classList.contains('drawflow-node') ? dest.id : 'none', '');

  if (!dest || !dest.classList.contains('drawflow-node')) return;

  var sel = editor.ele_selected;
  if (!sel || !sel.parentElement || !sel.parentElement.parentElement) return;
  var srcId  = sel.parentElement.parentElement.id.slice(5);
  var srcCls = sel.classList[1];
  var dstId  = dest.id.slice(5);

  if (!srcId || srcId === dstId) return;

  var nd = editor.getNodeFromId(dstId);
  if (!nd || Object.keys(nd.inputs).length === 0) return;

  if (tempSvg) { tempSvg.remove(); editor.connection_ele = null; }
  editor.connection = false;

  try {
    editor.addConnection(srcId, dstId, srcCls, 'input_1');
    dbg('d-add', ts() + '  ' + srcId + '→' + dstId + ' OK', 'ok');
  } catch (err) {
    dbg('d-add', 'ERRO: ' + err.message, 'err');
    console.error('addConnection:', err);
  }

}, true);

// ── utils ─────────────────────────────────────────────────────────────────────
function exportar() {
  var json = JSON.stringify(editor.export(), null, 2);
  var w = window.open('', '_blank');
  w.document.write('<pre style="font:13px monospace;padding:16px">' + json + '</pre>');
}

function limpar() {
  if (!confirm('Remover todas as conexões?')) return;
  var data = editor.export();
  Object.values(data.drawflow.Home.data).forEach(function (n) {
    Object.values(n.outputs).forEach(function (o) { o.connections = []; });
    Object.values(n.inputs).forEach(function (i)  { i.connections = []; });
  });
  editor.import(data);
}

document.addEventListener('keydown', function (e) {
  if ((e.key === 'Delete' || e.key === 'Backspace') && e.target === document.body) {
    editor.removeConnectionSelected();
  }
});
</script>
</body>
</html>
